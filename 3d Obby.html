<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D HTML5 Obby</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif;
            background: rgba(0,0,0,0.5); padding: 10px;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <h3>Simple 3D Obby</h3>
        <p>WASD: Move | Click to Lock Mouse</p>
    </div>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 3. Components (Platforms/Lava)
        const materials = {
            platform: new THREE.MeshLambertMaterial({ color: 0x00ff00 }),
            lava: new THREE.MeshLambertMaterial({ color: 0xff0000 })
        };

        // Create Platforms
        function createBox(x, y, z, w, h, d, material) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            return mesh;
        }

        // --- THE OBBY ---
        createBox(0, 0, 0, 5, 1, 5, materials.platform); // Start
        createBox(0, 0, -8, 3, 1, 3, materials.platform);
        createBox(3, 0, -15, 3, 1, 3, materials.platform);
        createBox(0, 0, -22, 3, 1, 3, materials.platform);
        
        // Lava Pit
        createBox(0, -0.5, -15, 15, 0.1, 20, materials.lava); 
        
        // Final Platform
        createBox(-3, 0, -30, 5, 1, 5, new THREE.MeshLambertMaterial({color: 0x0000ff}));

        // 4. Controls & Player
        const controls = new THREE.PointerLockControls(camera, document.body);
        scene.add(controls.getObject());
        camera.position.set(0, 2, 5);

        // Click to unlock mouse
        document.addEventListener('click', () => controls.lock());

        // Movement
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        // 5. Game Loop
        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * 0.016; // Friction
                velocity.z -= velocity.z * 10.0 * 0.016;
                
                if (moveForward) velocity.z -= 400.0 * 0.016;
                if (moveBackward) velocity.z += 400.0 * 0.016;
                if (moveLeft) velocity.x -= 400.0 * 0.016;
                if (moveRight) velocity.x += 400.0 * 0.016;
                
                controls.moveRight(-velocity.x * 0.016);
                controls.moveForward(-velocity.z * 0.016);
                controls.getObject().position.y = 2; // Keep at head height
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
